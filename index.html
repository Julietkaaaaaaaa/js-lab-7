<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTech | Преміум Гаджети</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        deepBlack: '#050505', 
                        surface: '#121212', 
                        surfaceGlow: '#1a1a1a',
                        accent: '#8b5cf6', 
                        accentHover: '#a78bfa'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { scroll-behavior: smooth; }
        .glass-card {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-deepBlack text-gray-300 font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden">
    
    <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] bg-accent/20 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[40%] h-[40%] bg-blue-900/20 blur-[100px] rounded-full pointer-events-none"></div>

    <header class="sticky top-0 z-50 glass-card shadow-2xl border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-accent to-blue-400">
                SMART<span class="text-white">TECH</span>
            </h1>
            <nav class="space-x-8">
                <a href="index.html" class="text-gray-400 hover:text-white transition duration-300 font-medium tracking-wide uppercase text-sm">Додому</a>
                <a href="#" id="catalog-link" class="text-gray-400 hover:text-accent transition duration-300 font-medium tracking-wide uppercase text-sm relative group">
                    Каталог
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-accent transition-all duration-300 group-hover:w-full"></span>
                </a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex-grow relative z-10" id="main-content">
        <div class="text-center mt-32 animate-fade-in">
            <span class="px-4 py-1 rounded-full border border-accent/30 text-accent text-sm font-semibold tracking-widest uppercase mb-6 inline-block bg-accent/10">
                Інноваційні рішення
            </span>
            <h2 class="text-5xl md:text-7xl font-extrabold mb-6 text-white drop-shadow-lg">
                Технології у <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-blue-500">новому форматі</span>
            </h2>
        </div>
    </main>

    <footer class="glass-card p-6 text-center text-sm text-gray-500 relative z-10">
        &copy; 2026 SmartTech. Лабораторна робота №7.
    </footer>

    <script src="script.js"></script>
</body>
</html>
