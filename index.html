<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTech | Магазин гаджетів</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        deepBlack: '#0a0a0a', 
                        surface: '#171717', 
                        accent: '#3b82f6', 
                        accentHover: '#60a5fa'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(23, 23, 23, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-deepBlack text-gray-300 font-sans antialiased min-h-screen flex flex-col relative">

    <header class="sticky top-0 z-50 glass-card shadow-lg backdrop-blur-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                <span class="text-accent">Smart</span>Tech
            </h1>
            <nav class="space-x-8">
                <a href="index.html" class="text-gray-400 hover:text-white transition font-medium text-sm">Додому</a>
                <a href="#" id="catalog-link" class="text-gray-400 hover:text-accent transition font-medium text-sm">Каталог гаджетів</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex-grow relative z-10" id="main-content">
        <div class="text-center mt-20">
            <h2 class="text-4xl md:text-5xl font-bold mb-6 text-white drop-shadow-md">
                Технології майбутнього <br/><span class="text-accent">вже сьогодні</span>
            </h2>
            <p class="text-gray-400 text-lg max-w-xl mx-auto mb-10 leading-relaxed">
                Натисніть «Каталог гаджетів» у верхньому меню, щоб переглянути асортимент дронів, VR-систем та пристроїв для розумного дому.
            </p>
        </div>
    </main>

    <footer class="glass-card p-6 text-center text-sm text-gray-500 relative z-10 mt-auto">
        &copy; 2026 SmartTech Store. Лабораторна робота №7.
    </footer>

    <script src="script.js"></script>
</body>
</html>
